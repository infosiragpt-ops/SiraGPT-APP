<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sira GPT</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070d;
        color: #f8fafc;
      }

      body {
        align-items: center;
        display: grid;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }

      main {
        margin: 0 auto;
        max-width: 420px;
      }

      .mark {
        align-items: center;
        background: #f8fafc;
        border-radius: 20px;
        color: #05070d;
        display: inline-flex;
        font-size: 24px;
        font-weight: 800;
        height: 80px;
        justify-content: center;
        margin-bottom: 20px;
        width: 80px;
      }

      h1 {
        font-size: 24px;
        margin: 0 0 10px;
      }

      p {
        color: #94a3b8;
        line-height: 1.5;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">S</div>
      <h1>Sira GPT</h1>
      <p>Conecta a internet para cargar la aplicacion.</p>
    </main>
  </body>
</html>
