<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Sira Appshots</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Sira Appshots</h1>
    </header>
    <main id="content">
      <p id="status" class="status">Cargando…</p>
      <button id="capture" type="button" hidden>Capturar ahora</button>

      <p class="hint">Atajo: <kbd>⌘⇧S</kbd> en Mac · <kbd>Ctrl⇧S</kbd> en Win/Linux</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
