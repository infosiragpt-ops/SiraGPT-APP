<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Sira Appshots — Opciones</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body { max-width: 520px; margin: 0 auto; padding: 32px 24px; }
      label { display: block; font-size: 12px; font-weight: 600; margin: 16px 0 6px; }
      input { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
      @media (prefers-color-scheme: dark) { input { background: #1e1e1e; color: #f5f5f5; border-color: #333; } }
      .row { display: flex; gap: 8px; }
      .row button { width: auto; flex: 0 0 auto; margin: 0; }
      .help { font-size: 12px; color: #6b7280; margin: 8px 0 0; line-height: 1.5; }
      ol { padding-left: 20px; font-size: 13px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <h1>Sira Appshots</h1>
    <p class="help">Para vincular esta extensi\u00f3n con tu cuenta de Sira:</p>
    <ol>
      <li>Abre <a id="settings-link" href="https://siragpt.com/settings/appshots" target="_blank" rel="noreferrer">siragpt.com/settings/appshots</a></li>
      <li>Pulsa <em>Generar c\u00f3digo</em></li>
      <li>Cop\u00ed\u00e1lo y p\u00e9galo aqu\u00ed abajo</li>
    </ol>

    <label for="token">C\u00f3digo de vinculaci\u00f3n</label>
    <div class="row">
      <input id="token" type="password" placeholder="ey…" autocomplete="off" spellcheck="false" />
      <button id="reveal" type="button">Ver</button>
    </div>

    <label for="apiBase">Servidor de Sira</label>
    <input id="apiBase" type="url" placeholder="https://siragpt.com" />
    <p class="help">D\u00e9jalo en <code>https://siragpt.com</code> salvo que est\u00e9s usando un entorno de pruebas.</p>

    <div class="row" style="margin-top: 20px;">
      <button id="save" type="button">Guardar</button>
      <button id="clear" type="button">Borrar vinculaci\u00f3n</button>
    </div>

    <p id="status" class="help"></p>

    <script src="options.js"></script>
  </body>
</html>
