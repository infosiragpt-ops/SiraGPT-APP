name: CodeQL

# F5 PR20 — SAST scanning for JS/TS via GitHub's CodeQL. Runs on every
# push to `main`, every pull-request into `main`, and weekly so the
# advisories database stays fresh against committed code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 7 * * 1'  # Mondays 07:23 UTC — off-peak, off-deploy.

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config: |
            paths-ignore:
              - "apps/upstream/**"
              - "changelog/upstream/**"
              - "config/upstream/**"
              - "extensions/upstream/**"
              - "packages/upstream/**"
              - "src/upstream/**"
              - "ui/upstream/**"
              - "attached_assets/**"
              - "test-results/**"
              - ".next/**"

      # JavaScript/TypeScript CodeQL extracts directly from source. Skipping
      # autobuild avoids spending minutes on vendored/upstream trees before the
      # analysis step and keeps the push SAST gate under its timeout budget.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
