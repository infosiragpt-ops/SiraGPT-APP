name: Deploy to production

# Production deploy is manual-only. Main can stay green in GitHub
# without automatically touching the VPS. Trigger this workflow from
# Actions only after CI is green and the release is explicitly approved.
on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Commit SHA to deploy; defaults to the selected branch SHA'
        required: false
        type: string

# Production deploys are serialized. cancel-in-progress is FALSE
# so a second push during an in-flight deploy queues behind it
# instead of killing the running deploy mid-pm2-restart.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Pre-deploy sanity checks (cycle 34) ─────────────────────
  # Lightweight gate that runs in the GH Actions runner BEFORE
  # we SSH to the VPS. Catches unsafe migrations early so we
  # never even attempt a destructive prod deploy.
  pre-check:
    name: Pre-deploy sanity checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha || github.sha }}

      - name: Migration safety check
        # Fails the pipeline on unsafe migrations unless the SQL
        # contains an explicit `-- migration-safety: allow-*` marker.
        # See scripts/check-migration-safety.js.
        run: node scripts/check-migration-safety.js

      - name: Notify Slack — deploy starting
        # Best-effort notification; never blocks the deploy.
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          DEPLOY_SHA: ${{ inputs.target_sha || github.sha }}
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "::notice::SLACK_DEPLOY_WEBHOOK not set — skipping Slack ping"
            exit 0
          fi
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":rocket: siraGPT deploy starting — sha=${DEPLOY_SHA::7} run=${GITHUB_RUN_ID}\"}" \
            "${SLACK_WEBHOOK_URL}" || true

  deploy:
    name: SSH to VPS · Docker Compose deploy
    needs: [pre-check]
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Deploy via SSH (with auto-rollback)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Remote Docker builds can exceed 12m when Next.js and npm
          # pruning run cold; keep enough headroom for deploy + rollback.
          timeout: 60s
          command_timeout: 45m
          script_stop: true
          script: |
            bash <<'SIRAGPT_DEPLOY'
            set -Eeuo pipefail
            APP_DIR="/opt/siragpt"
            COMPOSE="docker compose -f docker-compose.prod.yml -f docker-compose.production.override.yml --env-file .env"
            READY_URL="${READY_URL:-https://siragpt.com/api/health/ready}"

            wait_ready() {
              local deadline status
              deadline=$(( $(date +%s) + 60 ))
              while [[ $(date +%s) -lt "${deadline}" ]]; do
                status="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 "${READY_URL}" || true)"
                if [[ "${status}" == "200" ]]; then
                  return 0
                fi
                sleep 3
              done
              echo "[deploy-workflow] Health check failed: ${READY_URL} (last status: ${status:-none})"
              return 1
            }

            cd "${APP_DIR}"
            PREV_SHA="$(git rev-parse HEAD)"
            printf '%s\n' "${PREV_SHA}" > .deploy-prev-sha

            rollback() {
              local status="$?"
              if [[ "${status}" -eq 0 ]]; then
                return 0
              fi

              echo "[deploy-workflow] Deploy failed; rolling back to ${PREV_SHA}"
              set +e
              git reset --hard "${PREV_SHA}"
              ${COMPOSE} build backend frontend
              ${COMPOSE} up -d --no-deps backend frontend
              wait_ready
              local rollback_status="$?"
              if [[ "${rollback_status}" -ne 0 ]]; then
                echo "[deploy-workflow] Rollback attempted but health check still failed"
              else
                echo "[deploy-workflow] Rollback health check passed"
              fi
              exit "${status}"
            }
            trap rollback EXIT

            echo "[deploy-workflow] Remote disk before deploy"
            df -h / /var/lib/docker 2>/dev/null || df -h / || true
            docker system df || true
            rm -f "${APP_DIR}/.git/index.lock"
            TARGET_SHA="${{ inputs.target_sha || github.sha }}"
            echo "[deploy-workflow] Deploying ${TARGET_SHA} from ${PREV_SHA}"
            git fetch origin main
            git fetch origin "${TARGET_SHA}"
            git merge --ff-only "${TARGET_SHA}"
            ${COMPOSE} config -q
            ${COMPOSE} build backend frontend
            ${COMPOSE} up -d --no-deps backend frontend
            wait_ready
            echo "[deploy-workflow] Deploy health check passed: ${READY_URL}"
            SIRAGPT_DEPLOY

      - name: Surface deploy result
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "::notice::Production deploy succeeded — siragpt.com is on the new commit"
          else
            echo "::error::Production deploy failed. Check the SSH step output above for whether rollback succeeded."
            echo "::error::The SSH step attempts Docker Compose rollback to the previous SHA before failing."
          fi

  # ── Post-deploy health verification (cycle 34) ──────────────
  # Polls /health/ready from the GH Actions runner up to 60s.
  # If it never returns 200, SSHes into the VPS and rolls back to
  # the previous SHA saved by the deploy job. Currently
  # marked continue-on-error so it never wedges an otherwise
  # healthy deploy while the probe is being tuned.
  post-check:
    name: Post-deploy health check
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && needs.deploy.result == 'success'
    continue-on-error: true
    steps:
      - name: Poll /health/ready (max 60s)
        id: health
        env:
          READY_URL: ${{ secrets.READY_URL }}
        run: |
          URL="${READY_URL:-https://siragpt.com/api/health/ready}"
          echo "Polling ${URL}"
          deadline=$(( $(date +%s) + 60 ))
          while [[ $(date +%s) -lt ${deadline} ]]; do
            if curl -sSf -o /dev/null --max-time 5 "${URL}"; then
              echo "ready=true" >> "$GITHUB_OUTPUT"
              echo "::notice::/health/ready returned 200"
              exit 0
            fi
            sleep 3
          done
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::error::/health/ready did not return 200 within 60s"
          exit 1

      - name: Trigger auto-rollback via SSH
        if: failure() && steps.health.outputs.ready != 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30s
          command_timeout: 8m
          script_stop: true
          script: |
            bash <<'SIRAGPT_POSTCHECK_ROLLBACK'
            set -Eeuo pipefail
            APP_DIR="/opt/siragpt"
            COMPOSE="docker compose -f docker-compose.prod.yml -f docker-compose.production.override.yml --env-file .env"
            cd "${APP_DIR}"
            if [[ ! -s .deploy-prev-sha ]]; then
              echo "[deploy-workflow] No .deploy-prev-sha file found; skipping post-check rollback"
              exit 0
            fi
            PREV_SHA="$(cat .deploy-prev-sha)"
            echo "[deploy-workflow] Post-check rollback to ${PREV_SHA}"
            git reset --hard "${PREV_SHA}"
            ${COMPOSE} build backend frontend
            ${COMPOSE} up -d --no-deps backend frontend
            SIRAGPT_POSTCHECK_ROLLBACK

  # ── Source map upload (cycle 52, opt-in) ───────────────────
  # Uploads frontend + backend source maps to Sentry so production
  # stack traces resolve to original source. Only runs when the
  # SENTRY_AUTH_TOKEN repository secret is configured — without it
  # the whole job is skipped, so this is a no-op until ops opts in.
  # See docs/sentry-sourcemaps.md.
  sourcemaps:
    name: Upload source maps to Sentry
    needs: [deploy]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      vars.SOURCE_MAP_UPLOAD == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      SENTRY_RELEASE: ${{ inputs.target_sha || github.sha }}
    steps:
      - name: Guard — require SENTRY_AUTH_TOKEN
        run: |
          if [[ -z "${SENTRY_AUTH_TOKEN}" ]]; then
            echo "::notice::SENTRY_AUTH_TOKEN not set — skipping source map upload"
            exit 0
          fi

      - uses: actions/checkout@v4
        if: env.SENTRY_AUTH_TOKEN != ''
        with:
          ref: ${{ inputs.target_sha || github.sha }}

      - name: Setup Node
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install @sentry/cli
        if: env.SENTRY_AUTH_TOKEN != ''
        run: npm install -g @sentry/cli@2

      - name: Build (frontend) to generate source maps
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          GENERATE_SOURCEMAP: 'true'
        run: npm ci --no-audit --no-fund && npm run build

      - name: Upload source maps
        if: env.SENTRY_AUTH_TOKEN != ''
        run: ./scripts/upload-sentry-sourcemaps.sh

  notify:
    name: Slack notification
    needs: [deploy, post-check]
    if: always()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Post result to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          HEALTH_RESULT: ${{ needs.post-check.result }}
          DEPLOY_SHA: ${{ inputs.target_sha || github.sha }}
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "::notice::SLACK_DEPLOY_WEBHOOK not set — skipping Slack ping"
            exit 0
          fi
          if [[ "${DEPLOY_RESULT}" == "success" && "${HEALTH_RESULT}" != "failure" ]]; then
            EMOJI=":white_check_mark:"
            TEXT="siraGPT deploy succeeded — sha=${DEPLOY_SHA::7} health=${HEALTH_RESULT}"
          else
            EMOJI=":x:"
            TEXT="siraGPT deploy FAILED — deploy=${DEPLOY_RESULT} health=${HEALTH_RESULT} sha=${DEPLOY_SHA::7} run=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"${EMOJI} ${TEXT}\"}" \
            "${SLACK_WEBHOOK_URL}" || true
