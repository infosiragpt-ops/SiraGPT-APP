name: Emergency · diagnose+fix backend

# Manual recovery tool. Captures recent backend logs, optionally
# removes REDIS_URL from .env if the redis-session change is crashing
# the process, and restarts PM2. The whole thing is idempotent and
# never touches the database or git state.
on:
  workflow_dispatch:
    inputs:
      remove_redis_url:
        description: 'Strip REDIS_URL from .env before restart (rollback redis-session change)'
        type: boolean
        default: false

concurrency:
  group: emergency-fix
  cancel-in-progress: false

jobs:
  diagnose:
    name: SSH · diagnose + optional rollback
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Run diagnosis on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 5m
          script_stop: false
          script: |
            set +e
            cd /root/siraNew/siraGPT

            PM2_APP="${PM2_APP:-siraGPT-api}"
            if ! pm2 describe "$PM2_APP" >/dev/null 2>&1; then
              PM2_APP="$(pm2 jlist 2>/dev/null | node -e '
                const fs = require("fs");
                let list = [];
                try {
                  const input = fs.readFileSync(0, "utf8").trim();
                  list = input ? JSON.parse(input) : [];
                } catch {
                  list = [];
                }
                const text = (p) => [
                  p && p.name,
                  p && p.pm2_env && p.pm2_env.pm_cwd,
                  p && p.pm2_env && p.pm2_env.cwd,
                  p && p.pm2_env && p.pm2_env.pm_exec_path,
                  p && p.pm2_env && p.pm2_env.script
                ].filter(Boolean).join(" ");
                const found = list.find((p) => /siragpt|sira|backend|api/i.test(text(p)));
                if (found && found.name) process.stdout.write(found.name);
              ')"
            fi

            echo "=== PM2 list ==="
            pm2 list

            echo ""
            echo "=== PM2 describe: ${PM2_APP:-unknown} ==="
            if [[ -n "${PM2_APP:-}" ]]; then
              pm2 describe "$PM2_APP" || true
            fi

            echo ""
            echo "=== Last backend logs ==="
            if [[ -n "${PM2_APP:-}" ]]; then
              pm2 logs "$PM2_APP" --nostream --lines 120 || true
            else
              pm2 logs --nostream --lines 120 || true
            fi

            echo ""
            echo "=== REDIS_URL currently in .env? ==="
            grep -c '^REDIS_URL=' .env || true

            if [[ "${{ inputs.remove_redis_url }}" == "true" ]]; then
              echo ""
              echo "=== Removing REDIS_URL from .env (rollback) ==="
              sed -i '/^REDIS_URL=/d' .env
              sed -i '/^# Added by setup-redis-prod.sh/d' .env
              echo "REDIS_URL count after removal:"
              grep -c '^REDIS_URL=' .env || echo "0 (removed)"

              echo ""
              echo "=== Restarting PM2 backend ==="
              pm2 restart "$PM2_APP" --update-env

              echo ""
              echo "=== Wait 5s and poll /health ==="
              sleep 5
              for i in $(seq 1 20); do
                if curl -sSf -o /dev/null https://api.siragpt.com/health; then
                  echo "✓ Backend healthy after ${i}s"
                  echo "--- /health body ---"
                  curl -s https://api.siragpt.com/health | head -c 400
                  echo ""
                  exit 0
                fi
                sleep 2
              done
              echo "✗ Backend STILL unhealthy after 40s"
              echo "--- newer error log ---"
              pm2 logs "$PM2_APP" --nostream --lines 60 || true
              exit 1
            fi
