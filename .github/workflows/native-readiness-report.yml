name: Native readiness report

on:
  workflow_dispatch:
  pull_request:
    branches: [production-main]
    paths:
      - 'docs/native-app-release.md'
      - 'docs/mobile-store-release.md'
      - 'docs/store-submission/**'
      - 'app/support/**'
      - 'app/terms-of-service/**'
      - 'app/sitemap.ts'
      - 'app/robots.ts'
      - 'scripts/native-release-plan.js'
      - 'scripts/native-github-secrets-report.js'
      - 'scripts/generate-native-github-secrets-template.js'
      - 'scripts/generate-native-owner-handoff.js'
      - 'scripts/generate-native-store-owner-packet.js'
      - 'scripts/native-store-assets-readiness.js'
      - 'scripts/generate-native-store-packet.js'
      - 'scripts/native-store-readiness.js'
      - 'scripts/sync-native-version.js'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'apps/desktop/package.json'
      - '.github/workflows/native-readiness-report.yml'
  push:
    branches: [production-main]
    paths:
      - 'docs/native-app-release.md'
      - 'docs/mobile-store-release.md'
      - 'docs/store-submission/**'
      - 'app/support/**'
      - 'app/terms-of-service/**'
      - 'app/sitemap.ts'
      - 'app/robots.ts'
      - 'scripts/native-release-plan.js'
      - 'scripts/native-github-secrets-report.js'
      - 'scripts/generate-native-github-secrets-template.js'
      - 'scripts/generate-native-owner-handoff.js'
      - 'scripts/generate-native-store-owner-packet.js'
      - 'scripts/native-store-assets-readiness.js'
      - 'scripts/generate-native-store-packet.js'
      - 'scripts/native-store-readiness.js'
      - 'scripts/sync-native-version.js'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'apps/desktop/package.json'
      - '.github/workflows/native-readiness-report.yml'

permissions:
  contents: read

concurrency:
  group: native-readiness-report-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  report:
    name: Generate native release readiness packet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate native public metadata
        run: |
          npm run native:version:check
          npm run native:store:readiness -- --out=output/native-store-metadata-report.md --json-out=output/native-store-metadata-report.json
          npm run native:store:assets -- --out=output/native-store-assets-report.md --json-out=output/native-store-assets-report.json
          npm run native:store:packet -- --require-ready
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('output/native-store-metadata-report.json','utf8')); if (p.status !== 'ready') throw new Error('native store metadata is not ready'); if (p.distributionStatus !== 'owner-action-required') throw new Error('invalid native distribution status'); console.log('native-store-metadata-status=' + p.status); console.log('native-store-localizations=' + p.localizations.length)"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('output/native-store-assets-report.json','utf8')); if (!['ready','blocked'].includes(p.status)) throw new Error('invalid native store asset status'); console.log('native-store-assets-status=' + p.status); console.log('native-store-assets-blocked-platforms=' + p.blockedPlatforms.length)"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('output/native-store-submission-packet.json','utf8')); if (p.status !== 'ready') throw new Error('native store packet is not ready'); console.log('native-store-packet-status=' + p.status); console.log('native-store-packet-platforms=' + p.platforms.length)"

      - name: Generate non-secret readiness plan
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          npm run native:release:plan:ci
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('output/native-release-plan.json','utf8')); if (!['ready','blocked'].includes(p.status)) throw new Error('invalid native readiness status'); if (p.githubSecretAudit.source !== 'env') throw new Error('expected env secret source'); console.log('native-readiness-status=' + p.status); console.log('native-readiness-missing-secrets=' + p.missingSecrets.length)"
          npm run native:github-secrets:report -- --source=env --out=output/native-github-secrets-report.md --json-out=output/native-github-secrets-report.json
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('output/native-github-secrets-report.json','utf8')); if (!['ready','blocked-missing-native-signing-secrets'].includes(p.status)) throw new Error('invalid native github secrets report status'); console.log('native-github-secrets-report-status=' + p.status); console.log('native-github-secrets-report-missing-groups=' + p.missingRequiredGroups.length)"
          npm run native:release:handoff -- --out=output/native-owner-handoff.md --json-out=output/native-owner-handoff.json
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('output/native-owner-handoff.json','utf8')); if (p.status !== 'owner-action-required') throw new Error('invalid native owner handoff status'); console.log('native-owner-handoff-platforms=' + p.platformPlans.length)"
          node scripts/generate-native-store-owner-packet.js --repo=${{ github.repository }} --source-sha=${{ github.sha }} --secret-source=env --json > output/native-store-owner-packet-summary.json
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('output/native-store-owner-packet-summary.json','utf8')); if (p.status !== 'owner-action-required') throw new Error('invalid native store owner packet status'); if (!p.checksumSha256) throw new Error('missing native store owner packet checksum'); console.log('native-store-owner-packet=' + p.zipPath)"

      - name: Upload native readiness packet
        uses: actions/upload-artifact@v6
        with:
          name: siragpt-native-readiness-report
          path: |
            output/native-store-assets-report.md
            output/native-store-assets-report.json
            output/native-store-metadata-report.md
            output/native-store-metadata-report.json
            output/native-store-submission-packet/**
            output/native-store-submission-packet.json
            output/native-release-plan.md
            output/native-release-plan.json
            output/native-github-secrets-report.md
            output/native-github-secrets-report.json
            output/native-owner-handoff.md
            output/native-owner-handoff.json
            output/native-store-owner-packet-summary.json
            output/SiraGPT-native-store-owner-packet-*.zip
            output/SiraGPT-native-store-owner-packet-*.zip.sha256
          retention-days: 30
          if-no-files-found: error
