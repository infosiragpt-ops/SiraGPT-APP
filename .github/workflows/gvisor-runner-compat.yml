name: gVisor runner compatibility

on:
  workflow_dispatch:
  pull_request:
    branches: [main, production-main]
    paths:
      - '.github/workflows/gvisor-runner-compat.yml'
      - 'scripts/runner.Dockerfile'
      - 'scripts/code-runner*.js'
      - 'scripts/generate-gvisor-fullstack-fixture.js'
      - 'scripts/gvisor-runner-smoke.mjs'
      - 'backend/src/services/codex/starter-files.js'
      - 'backend/src/services/codex/sandbox-provider.js'
      - 'backend/src/services/codex/sandbox-providers/**'
      - 'backend/tests/fixtures/codex-fullstack-gvisor/**'
      - 'backend/tests/codex-gvisor-workflow-contract.test.js'
      - 'docker-compose.prod.yml'
  push:
    branches: [production-main]
    paths:
      - '.github/workflows/gvisor-runner-compat.yml'
      - 'scripts/runner.Dockerfile'
      - 'scripts/code-runner*.js'
      - 'scripts/generate-gvisor-fullstack-fixture.js'
      - 'scripts/gvisor-runner-smoke.mjs'
      - 'backend/src/services/codex/starter-files.js'
      - 'backend/src/services/codex/sandbox-provider.js'
      - 'backend/src/services/codex/sandbox-providers/**'
      - 'backend/tests/fixtures/codex-fullstack-gvisor/**'
      - 'backend/tests/codex-gvisor-workflow-contract.test.js'
      - 'docker-compose.prod.yml'

permissions:
  contents: read

concurrency:
  group: gvisor-runner-compat-${{ github.ref }}
  cancel-in-progress: true

env:
  # Deliberately pinned. Upgrade the version and digest together after review.
  RUNSC_VERSION: release-20260714.0
  RUNSC_SHA512_X86_64: 75c092fe87d84078f06ac40937cb5207fb5a1a92511b38b4790c915801555daadc59fef33de8db4dd92e1892a6de390c8a2e390a7a3bd0e2d3731d9ed6a3a6e8
  RUNSC_RUNTIME: runsc-systrap
  RUNNER_IMAGE: siragpt-runner:gvisor-compat

jobs:
  compatibility:
    name: runsc systrap · runner smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Install the pinned runsc binary
        shell: bash
        run: |
          set -euo pipefail
          # Git tags include the release- prefix, while the signed binary
          # bucket stores immutable versions below release/<date.version>/.
          URL="https://storage.googleapis.com/gvisor/releases/release/${RUNSC_VERSION#release-}/x86_64/runsc"
          curl --proto '=https' --tlsv1.2 -fsSLo /tmp/runsc "${URL}"
          echo "${RUNSC_SHA512_X86_64}  /tmp/runsc" | sha512sum -c -
          sudo install -o root -g root -m 0755 /tmp/runsc /usr/local/bin/runsc
          /usr/local/bin/runsc --version

      - name: Register systrap on this ephemeral runner only
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="$(mktemp)"
          TARGET="$(mktemp)"
          if sudo test -s /etc/docker/daemon.json; then
            sudo cat /etc/docker/daemon.json > "${SOURCE}"
          else
            printf '{}\n' > "${SOURCE}"
          fi
          jq \
            --arg runtime "${RUNSC_RUNTIME}" \
            '.runtimes = (.runtimes // {})
             | .runtimes[$runtime] = {
                 "path": "/usr/local/bin/runsc",
                 "runtimeArgs": ["--platform=systrap", "--network=sandbox"]
               }' \
            "${SOURCE}" > "${TARGET}"
          sudo install -o root -g root -m 0644 "${TARGET}" /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info --format '{{json .Runtimes}}' | jq -e --arg runtime "${RUNSC_RUNTIME}" 'has($runtime)'

      - name: Build the production runner image
        run: docker build --file scripts/runner.Dockerfile --tag "${RUNNER_IMAGE}" scripts

      - name: Generate and install the exact full-stack starter under runsc
        shell: bash
        run: |
          set -euo pipefail
          workspace="${RUNNER_TEMP}/siragpt-gvisor-workspace"
          project="${workspace}/projects/fullstack-smoke"

          mkdir -p "${workspace}"
          sudo mount -t tmpfs \
            -o size=768m,mode=0711,nosuid,nodev \
            siragpt-gvisor-workspace "${workspace}"
          sudo chown "$(id -u):$(id -g)" "${workspace}"
          mkdir -p "${workspace}/projects"
          chmod 0711 "${workspace}" "${workspace}/projects"

          node scripts/generate-gvisor-fullstack-fixture.js "${project}"
          identity="$(node - <<'NODE'
          const { projectIdentity } = require('./scripts/code-runner-utils');
          process.stdout.write(JSON.stringify(projectIdentity('fullstack-smoke')));
          NODE
          )"
          project_uid="$(jq -r '.uid' <<<"${identity}")"
          project_gid="$(jq -r '.gid' <<<"${identity}")"
          sudo chown -R "${project_uid}:${project_gid}" "${project}"
          sudo chmod 0700 "${project}"

          # Dependency acquisition happens with the same pinned image, Bun,
          # project UID and runsc runtime used by the real runner. The final
          # /run below has an empty cache and no network, so it must still
          # execute the production `bun install` path successfully offline.
          docker run --rm \
            --name siragpt-gvisor-install \
            --runtime "${RUNSC_RUNTIME}" \
            --network bridge \
            --read-only \
            --user "${project_uid}:${project_gid}" \
            --workdir /workspace/projects/fullstack-smoke \
            --tmpfs /tmp:rw,nosuid,nodev,size=64m,mode=1777 \
            --tmpfs /runner-cache:rw,nosuid,nodev,size=256m,mode=1777 \
            --tmpfs /runner-home:rw,nosuid,nodev,size=64m,mode=1777 \
            --tmpfs /runner-tmp:rw,nosuid,nodev,size=64m,mode=1777 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --pids-limit 256 \
            --cpus 1 \
            --memory 2g \
            --env HOME=/runner-home \
            --env TMPDIR=/runner-tmp \
            --env XDG_CACHE_HOME=/runner-cache/xdg \
            --env BUN_INSTALL_CACHE_DIR=/runner-cache/bun \
            --mount type=bind,src="${project}",dst=/workspace/projects/fullstack-smoke \
            "${RUNNER_IMAGE}" bun install --frozen-lockfile --no-progress

          sudo test -s "${project}/bun.lock"
          for dependency in express react vite concurrently; do
            sudo test -e "${project}/node_modules/${dependency}"
          done
          test "$(sudo stat -c '%u' "${project}")" = "${project_uid}"
          test "$(sudo stat -c '%g' "${project}")" = "${project_gid}"

          echo "GVS_WORKSPACE=${workspace}" >> "${GITHUB_ENV}"
          echo "GVS_PROJECT_UID=${project_uid}" >> "${GITHUB_ENV}"
          echo "GVS_PROJECT_GID=${project_gid}" >> "${GITHUB_ENV}"

      - name: Exercise tools, runtime identity, and containment
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach \
            --name siragpt-gvisor-compat \
            --runtime "${RUNSC_RUNTIME}" \
            --network none \
            --read-only \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=64m \
            --mount type=bind,src="${GVS_WORKSPACE}",dst=/workspace \
            --tmpfs /export:rw,nosuid,nodev,size=64m,mode=0700 \
            --tmpfs /runner-cache:rw,nosuid,nodev,size=128m,mode=0711 \
            --tmpfs /runner-home:rw,nosuid,nodev,size=64m,mode=0711 \
            --tmpfs /runner-tmp:rw,nosuid,nodev,size=64m,mode=0711 \
            --cap-drop ALL \
            --cap-add CHOWN \
            --cap-add DAC_OVERRIDE \
            --cap-add FOWNER \
            --cap-add KILL \
            --cap-add SETGID \
            --cap-add SETUID \
            --security-opt no-new-privileges:true \
            --pids-limit 256 \
            --cpus 1 \
            --memory 2g \
            --env NODE_ENV=production \
            --env CODE_RUNNER_CONTROL_TOKEN=gvisor-smoke-control-token \
            --env CODE_RUNNER_DEV_PORT_POOL=5173-5174 \
            --env CODE_RUNNER_RLIMIT_AS_BYTES=68719476736 \
            --env CODE_RUNNER_INSTALL_TIMEOUT_MS=180000 \
            --env CODE_RUNNER_DEV_READY_TIMEOUT_MS=90000 \
            --env GVISOR_SMOKE_PROJECT_UID="${GVS_PROJECT_UID}" \
            --mount type=bind,src="${GITHUB_WORKSPACE}/scripts/code-runner.js",dst=/scripts/code-runner.js,readonly \
            --mount type=bind,src="${GITHUB_WORKSPACE}/scripts/code-runner-utils.js",dst=/scripts/code-runner-utils.js,readonly \
            --mount type=bind,src="${GITHUB_WORKSPACE}/scripts/gvisor-runner-smoke.mjs",dst=/smoke/gvisor-runner-smoke.mjs,readonly \
            "${RUNNER_IMAGE}" bun /scripts/code-runner.js

          docker exec siragpt-gvisor-compat bun /smoke/gvisor-runner-smoke.mjs

          docker inspect siragpt-gvisor-compat > /tmp/gvisor-inspect.json
          jq '.[0] | {
            Runtime: .HostConfig.Runtime,
            ReadonlyRootfs: .HostConfig.ReadonlyRootfs,
            NetworkMode: .HostConfig.NetworkMode,
            PidsLimit: .HostConfig.PidsLimit,
            NanoCpus: .HostConfig.NanoCpus,
            Memory: .HostConfig.Memory,
            CapDrop: .HostConfig.CapDrop,
            CapAdd: .HostConfig.CapAdd,
            SecurityOpt: .HostConfig.SecurityOpt,
            MountDestinations: [.Mounts[].Destination]
          }' /tmp/gvisor-inspect.json
          jq -e --arg runtime "${RUNSC_RUNTIME}" '
            .[0].HostConfig.Runtime == $runtime
            and .[0].HostConfig.ReadonlyRootfs == true
            and .[0].HostConfig.NetworkMode == "none"
            and .[0].HostConfig.PidsLimit == 256
            and .[0].HostConfig.NanoCpus == 1000000000
            and .[0].HostConfig.Memory == 2147483648
            and (.[0].HostConfig.CapDrop | index("ALL") != null)
            and ([.[0].HostConfig.CapAdd[] | sub("^CAP_"; "")] | sort == ["CHOWN", "DAC_OVERRIDE", "FOWNER", "KILL", "SETGID", "SETUID"])
            and (.[0].HostConfig.SecurityOpt | index("no-new-privileges:true") != null)
            and ([.[0].Mounts[].Destination] | index("/var/run/docker.sock") == null)
            and any(.[0].Mounts[];
              .Destination == "/workspace"
              and .Type == "bind"
              and .RW == true
            )
          ' /tmp/gvisor-inspect.json

          if docker exec siragpt-gvisor-compat sh -ceu 'touch /rootfs-write-probe'; then
            echo '::error ::read-only root filesystem was writable'
            exit 1
          fi
          docker exec siragpt-gvisor-compat sh -ceu 'touch /tmp/tmpfs-write-probe && test -f /tmp/tmpfs-write-probe'

      - name: Cleanup ephemeral smoke container
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          cleanup_failed=0
          for container in siragpt-gvisor-install siragpt-gvisor-compat; do
            if docker inspect "${container}" >/dev/null 2>&1; then
              docker rm --force "${container}" || cleanup_failed=1
            fi
          done
          workspace="${RUNNER_TEMP}/siragpt-gvisor-workspace"
          if mountpoint -q "${workspace}"; then
            sudo umount "${workspace}" || cleanup_failed=1
          fi
          if mountpoint -q "${workspace}"; then
            echo "::error ::gVisor workspace tmpfs remained mounted"
            cleanup_failed=1
          elif [ -d "${workspace}" ]; then
            rmdir "${workspace}" || cleanup_failed=1
          fi
          exit "${cleanup_failed}"
