name: DB snapshot · ai_models

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30s
          command_timeout: 2m
          script: |
            echo "=== Total ai_models in DB ==="
            docker exec siragpt-db-1 psql -U myuser -d siraGPTNew -tAc "SELECT COUNT(*) FROM ai_models"
            echo ""
            echo "=== Active models breakdown ==="
            docker exec siragpt-db-1 psql -U myuser -d siraGPTNew -c "SELECT name, provider, type, \"isActive\" FROM ai_models ORDER BY \"createdAt\""
            echo ""
            echo "=== Currently inactive models ==="
            docker exec siragpt-db-1 psql -U myuser -d siraGPTNew -c "SELECT name, provider, \"isActive\" FROM ai_models WHERE \"isActive\"=false"
