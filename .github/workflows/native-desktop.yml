name: Native desktop builds

on:
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: 'Publish durable unsigned desktop beta assets to GitHub Releases'
        required: true
        default: true
        type: boolean
      windows_store_package:
        description: 'Build Microsoft Store AppX as auto, QA identity, or exact Partner Center identity'
        required: true
        default: auto
        type: choice
        options:
          - auto
          - qa
          - store
  pull_request:
    branches: [production-main]
    paths:
      - 'apps/desktop/**'
      - 'scripts/build-desktop.sh'
      - 'scripts/build-windows-store-appx.js'
      - 'scripts/generate-windows-appx-assets.js'
      - 'scripts/validate-windows-store-appx.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/native-desktop.yml'
  push:
    branches: [production-main]
    paths:
      - 'apps/desktop/**'
      - 'scripts/build-desktop.sh'
      - 'scripts/build-windows-store-appx.js'
      - 'scripts/generate-windows-appx-assets.js'
      - 'scripts/validate-windows-store-appx.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/native-desktop.yml'

env:
  NODE_VERSION: '24'
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

permissions:
  contents: read

jobs:
  macos:
    name: macOS DMG + ZIP
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate desktop shell
        run: |
          npm run native:version:check
          node -c apps/desktop/main.cjs
          node -c apps/desktop/runtime.cjs
          test -f apps/desktop/offline.html
          sh -n scripts/build-desktop.sh

      - name: Build macOS artifacts
        run: npm run desktop:dist:mac

      - name: Stage macOS QA artifacts with manifest
        shell: bash
        run: |
          set -eu
          mkdir -p output/native-qa/macos
          find output/desktop -maxdepth 1 -type f \( -name '*.dmg' -o -name '*-mac.zip' -o -name '*.blockmap' \) -exec cp {} output/native-qa/macos/ \;
          if [ "$(find output/native-qa/macos -type f | wc -l | tr -d ' ')" -eq 0 ]; then
            echo "No macOS artifacts found in output/desktop" >&2
            exit 1
          fi
          node scripts/generate-native-release-manifest.js \
            --dir=output/native-qa \
            --out=output/native-qa/native-release-manifest.json \
            --markdown-out=output/native-qa/native-release-manifest.md \
            --checksums-out=output/native-qa/SHA256SUMS.txt \
            --release-tag="native-qa-${GITHUB_RUN_NUMBER}" \
            --git-sha="$GITHUB_SHA"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: siragpt-desktop-macos
          path: |
            output/native-qa/macos/*
            output/native-qa/native-release-manifest.json
            output/native-qa/native-release-manifest.md
            output/native-qa/SHA256SUMS.txt
          retention-days: 14
          if-no-files-found: error

  windows:
    name: Windows x64 NSIS + portable + Store AppX
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate desktop shell
        run: |
          npm run native:version:check
          node -c apps/desktop/main.cjs
          node -c apps/desktop/runtime.cjs
          if (-not (Test-Path "apps/desktop/offline.html")) { throw "offline.html is required" }
          npm run desktop:assets:win:store -- --check

      - name: Build Windows artifacts
        run: npm run desktop:dist:win

      - name: Build Microsoft Store AppX
        env:
          WINDOWS_STORE_PACKAGE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.windows_store_package || 'auto' }}
          WINDOWS_STORE_IDENTITY_NAME: ${{ vars.WINDOWS_STORE_IDENTITY_NAME }}
          WINDOWS_STORE_PUBLISHER: ${{ vars.WINDOWS_STORE_PUBLISHER }}
          WINDOWS_STORE_PUBLISHER_DISPLAY_NAME: ${{ vars.WINDOWS_STORE_PUBLISHER_DISPLAY_NAME }}
          WINDOWS_STORE_APPLICATION_ID: ${{ vars.WINDOWS_STORE_APPLICATION_ID }}
        run: npm run desktop:dist:win:store

      - name: Validate Microsoft Store AppX
        run: npm run desktop:validate:win:store

      - name: Stage Windows QA artifacts with manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "output/native-qa/windows" | Out-Null
          $files = Get-ChildItem -Path "output/desktop" -File | Where-Object {
            $_.Name -like "*.exe" -or
            $_.Name -like "*.blockmap" -or
            $_.Name -like "*.appx" -or
            $_.Name -eq "windows-store-package.json"
          }
          if ($files.Count -eq 0) {
            throw "No Windows artifacts found in output/desktop"
          }
          if (-not ($files | Where-Object { $_.Name -like "*.appx" })) {
            throw "No Windows Store AppX package found in output/desktop"
          }
          foreach ($file in $files) {
            Copy-Item -Path $file.FullName -Destination "output/native-qa/windows/$($file.Name)" -Force
          }
          node scripts/generate-native-release-manifest.js `
            --dir=output/native-qa `
            --out=output/native-qa/native-release-manifest.json `
            --markdown-out=output/native-qa/native-release-manifest.md `
            --checksums-out=output/native-qa/SHA256SUMS.txt `
            --release-tag="native-qa-$env:GITHUB_RUN_NUMBER" `
            --git-sha="$env:GITHUB_SHA"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: siragpt-desktop-windows-x64
          path: |
            output/native-qa/windows/*
            output/native-qa/native-release-manifest.json
            output/native-qa/native-release-manifest.md
            output/native-qa/SHA256SUMS.txt
          retention-days: 14
          if-no-files-found: error

  publish-beta:
    name: Publish desktop beta prerelease
    needs: [macos, windows]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_prerelease }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v6
        with:
          name: siragpt-desktop-macos
          path: output/desktop-beta-input/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v6
        with:
          name: siragpt-desktop-windows-x64
          path: output/desktop-beta-input/windows

      - name: Assemble auditable prerelease
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./apps/desktop/package.json').version")"
          short_sha="${GITHUB_SHA::7}"
          release_tag="desktop-beta-v${version}-${short_sha}"
          staging="output/desktop-beta-release"
          mkdir -p "$staging"

          find output/desktop-beta-input/macos -type f \( -name '*.dmg' -o -name '*-mac.zip' -o -name '*.blockmap' \) -exec cp {} "$staging"/ \;
          find output/desktop-beta-input/windows -type f \( -name '*.exe' -o -name '*.blockmap' -o -name '*.appx' -o -name 'windows-store-package.json' \) -exec cp {} "$staging"/ \;
          while IFS= read -r -d '' artifact; do
            file_name="$(basename "$artifact")"
            normalized_name="${file_name// /.}"
            normalized_path="$(dirname "$artifact")/$normalized_name"
            if [[ -e "$normalized_path" ]]; then
              echo "Release artifact name collision: $normalized_name" >&2
              exit 1
            fi
            mv "$artifact" "$normalized_path"
          done < <(find "$staging" -maxdepth 1 -type f -name '* *' -print0)
          if ! find "$staging" -type f -name '*.dmg' -print -quit | grep -q .; then
            echo "macOS DMG missing from desktop beta" >&2
            exit 1
          fi
          if ! find "$staging" -type f -name '*.exe' -print -quit | grep -q .; then
            echo "Windows installer missing from desktop beta" >&2
            exit 1
          fi
          appx_path="$(find "$staging" -maxdepth 1 -type f -name '*.appx' -print -quit)"
          store_metadata="$staging/windows-store-package.json"
          if [[ -z "$appx_path" ]]; then
            echo "Windows Store AppX missing from desktop beta" >&2
            exit 1
          fi
          if [[ ! -f "$store_metadata" ]]; then
            echo "Windows Store package metadata missing from desktop beta" >&2
            exit 1
          fi

          package_mode="$(jq -er '.packageMode' "$store_metadata")"
          store_submission_ready="$(jq -r '.storeSubmissionReady | tostring' "$store_metadata")"
          installable_directly="$(jq -r '.installableDirectly | tostring' "$store_metadata")"
          metadata_appx_name="$(jq -er '.package.fileName' "$store_metadata")"
          metadata_appx_sha="$(jq -er '.package.sha256' "$store_metadata")"
          appx_name="$(basename "$appx_path")"
          appx_sha="$(sha256sum "$appx_path" | awk '{print $1}')"
          if [[ "$store_submission_ready" != "true" && "$store_submission_ready" != "false" ]]; then
            echo "Invalid storeSubmissionReady value in Windows Store metadata" >&2
            exit 1
          fi
          if [[ "$installable_directly" != "true" && "$installable_directly" != "false" ]]; then
            echo "Invalid installableDirectly value in Windows Store metadata" >&2
            exit 1
          fi
          if [[ "$appx_name" != "$metadata_appx_name" ]]; then
            echo "Windows Store metadata names $metadata_appx_name but staged package is $appx_name" >&2
            exit 1
          fi
          if [[ "$appx_sha" != "$metadata_appx_sha" ]]; then
            echo "Windows Store AppX checksum does not match its metadata" >&2
            exit 1
          fi
          if [[ "$store_submission_ready" == "true" ]]; then
            appx_guidance="El AppX usa la identidad reservada de Partner Center; aún requiere certificación de la tienda."
          else
            appx_guidance="El AppX QA no debe enviarse a Partner Center hasta configurar la identidad exacta de la tienda."
          fi

          node scripts/generate-native-release-manifest.js \
            --dir="$staging" \
            --out="$staging/native-release-manifest.json" \
            --markdown-out="$staging/native-release-manifest.md" \
            --checksums-out="$staging/SHA256SUMS.txt" \
            --release-tag="$release_tag" \
            --git-sha="$GITHUB_SHA"

          cat > "$staging/RELEASE_NOTES.md" <<EOF
          ## SiraGPT Desktop beta ${version}

          Aplicación de evaluación para macOS (Apple Silicon e Intel) y Windows x64.

          - Canal: beta sin firma pública.
          - Código: ${GITHUB_SHA}.
          - AppX: \`${appx_name}\` (modo \`${package_mode}\`, Store ready: \`${store_submission_ready}\`, instalación directa: \`${installable_directly}\`).
          - ${appx_guidance}
          - Verificación: consulta \`SHA256SUMS.txt\` y \`native-release-manifest.json\`.
          - Producción general: espera la versión firmada y notarizada.
          EOF

          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "staging=$staging" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          STAGING: ${{ steps.release.outputs.staging }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find "$STAGING" -maxdepth 1 -type f ! -name 'RELEASE_NOTES.md' -print0 | sort -z)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            tag_target="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')"
            if [[ "$tag_target" != "$GITHUB_SHA" ]]; then
              echo "Release tag $RELEASE_TAG points to $tag_target instead of build SHA $GITHUB_SHA" >&2
              exit 1
            fi
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
            gh release edit "$RELEASE_TAG" --prerelease --title "SiraGPT Desktop beta ${RELEASE_TAG#desktop-beta-v}" --notes-file "$STAGING/RELEASE_NOTES.md"
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --target "$GITHUB_SHA" --prerelease --title "SiraGPT Desktop beta ${RELEASE_TAG#desktop-beta-v}" --notes-file "$STAGING/RELEASE_NOTES.md"
          fi
