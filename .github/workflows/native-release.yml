name: Native signed release packages

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform package to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
          - macos
          - windows
      release_tag:
        description: GitHub Release tag to create or update when enabled
        required: true
        default: native-v0.4.4
        type: string
      create_github_release:
        description: Create or update the GitHub Release with built artifacts
        required: true
        default: false
        type: boolean
      upload_ios_app_store_connect:
        description: Upload the signed iOS IPA to App Store Connect after building it
        required: true
        default: false
        type: boolean
      upload_android_google_play:
        description: Upload the signed Android AAB to Google Play after building it
        required: true
        default: false
        type: boolean
      android_play_track:
        description: Google Play track for Android uploads
        required: true
        default: qa
        type: string
      android_release_status:
        description: Google Play release status for Android uploads
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed
          - inProgress
      android_user_fraction:
        description: Required only when android_release_status is inProgress, for example 0.05
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: native-signed-release-${{ github.ref }}-${{ inputs.platform }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  JAVA_VERSION: '21'

jobs:
  preflight:
    name: Signed release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate selected signing secrets
        shell: bash
        env:
          PLATFORM: ${{ inputs.platform }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_PLAY_UPLOAD_SHA1: ${{ vars.ANDROID_PLAY_UPLOAD_SHA1 }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          UPLOAD_IOS_APP_STORE_CONNECT: ${{ inputs.upload_ios_app_store_connect }}
          UPLOAD_ANDROID_GOOGLE_PLAY: ${{ inputs.upload_android_google_play }}
          ANDROID_RELEASE_STATUS: ${{ inputs.android_release_status }}
          ANDROID_USER_FRACTION: ${{ inputs.android_user_fraction }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -eu
          case "$PLATFORM" in
            all|android)
              test -n "$ANDROID_PLAY_UPLOAD_SHA1" || {
                echo "ANDROID_PLAY_UPLOAD_SHA1 must match the upload certificate registered in Google Play" >&2
                exit 1
              }
              ;;
          esac
          npm run native:version:check
          npm run native:release:preflight -- \
            --out=output/native-release-preflight/preflight.md \
            --json-out=output/native-release-preflight/preflight.json

      - name: Upload signed release preflight packet
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: siragpt-native-signed-release-preflight
          path: output/native-release-preflight/*
          retention-days: 30
          if-no-files-found: error

  android:
    name: Android signed AAB + APK
    if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          npm run native:version:check
          npm run native:readiness:android

      - name: Prepare Android upload key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          mkdir -p android/keystores
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystores/siragpt-upload-key.jks
          cat > android/keystore.properties <<EOF
          storeFile=keystores/siragpt-upload-key.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build signed Android artifacts
        shell: bash
        run: |
          set -eu
          npm run mobile:sync -- android
          chmod +x android/gradlew
          cd android
          ./gradlew :app:bundleRelease :app:assembleRelease --no-daemon --stacktrace
          cd ..
          short_sha="${GITHUB_SHA::7}"
          mkdir -p output/native-release/android
          cp android/app/build/outputs/bundle/release/app-release.aab "output/native-release/android/SiraGPT-${short_sha}.aab"
          cp android/app/build/outputs/apk/release/app-release.apk "output/native-release/android/SiraGPT-${short_sha}.apk"

      - name: Verify Android artifact signatures
        shell: bash
        run: |
          set -eu
          aab_path="$(find output/native-release/android -type f -name '*.aab' -print -quit)"
          apk_path="$(find output/native-release/android -type f -name '*.apk' -print -quit)"
          test -n "$aab_path"
          test -n "$apk_path"
          jarsigner -verify -verbose -certs "$aab_path"
          keytool -printcert -jarfile "$aab_path" >/dev/null
          apksigner_path="$(find "${ANDROID_HOME:?}/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
          if [ ! -x "$apksigner_path" ]; then
            echo "Android SDK apksigner was not found" >&2
            exit 1
          fi
          "$apksigner_path" verify --verbose --print-certs "$apk_path"

      - name: Verify Google Play upload certificate
        shell: bash
        env:
          ANDROID_PLAY_UPLOAD_SHA1: ${{ vars.ANDROID_PLAY_UPLOAD_SHA1 }}
        run: |
          set -eu
          aab_path="$(find output/native-release/android -type f -name '*.aab' -print -quit)"
          test -n "$aab_path"
          npm run native:android:signing-fingerprint -- --aab="$aab_path"

      - name: Upload Android signed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: siragpt-native-android
          path: |
            output/native-release/android/*.aab
            output/native-release/android/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Validate Google Play upload secret
        if: ${{ inputs.upload_android_google_play }}
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: npm run native:readiness -- --require=googleplay --only-required

      - name: Upload Android bundle to Google Play
        if: ${{ inputs.upload_android_google_play }}
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          ANDROID_PLAY_TRACK: ${{ inputs.android_play_track }}
          ANDROID_RELEASE_STATUS: ${{ inputs.android_release_status }}
          ANDROID_USER_FRACTION: ${{ inputs.android_user_fraction }}
        run: |
          set -eu
          aab_path="$(find output/native-release/android -type f -name '*.aab' -print -quit)"
          if [ -z "$aab_path" ]; then
            echo "No signed Android AAB found in output/native-release/android" >&2
            exit 1
          fi

          args=(
            "--aab=$aab_path"
            "--package=com.siragpt.app"
            "--track=$ANDROID_PLAY_TRACK"
            "--status=$ANDROID_RELEASE_STATUS"
            "--release-name=SiraGPT ${GITHUB_SHA::7}"
          )
          if [ -n "$ANDROID_USER_FRACTION" ]; then
            args+=("--user-fraction=$ANDROID_USER_FRACTION")
          fi

          npm run native:play:upload -- "${args[@]}"

      - name: Remove Android signing assets
        if: ${{ always() }}
        shell: bash
        run: rm -f android/keystore.properties android/keystores/siragpt-upload-key.jks

  ios:
    name: iOS signed IPA
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ios' }}
    needs: preflight
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate iOS signing secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          npm run native:version:check
          npm run native:readiness:ios

      - name: Validate App Store Connect upload secrets
        if: ${{ inputs.upload_ios_app_store_connect }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: npm run native:readiness -- --require=appstore --only-required

      - name: Install iOS signing assets
        id: ios_signing
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -eu
          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          keychain_path="$RUNNER_TEMP/siragpt-signing.keychain-db"
          cert_path="$RUNNER_TEMP/ios-signing.p12"
          profile_path="$RUNNER_TEMP/profile.mobileprovision"
          profile_plist="$RUNNER_TEMP/profile.plist"

          printf '%s' "$IOS_SIGNING_CERTIFICATE_BASE64" | decode_base64 > "$cert_path"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | decode_base64 > "$profile_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -P "$IOS_SIGNING_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"

          security cms -D -i "$profile_path" > "$profile_plist"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$profile_plist")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print Name' "$profile_plist")"
          profile_team_id="$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$profile_plist")"
          profile_app_identifier="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$profile_plist")"

          if [ "$profile_team_id" != "$APPLE_TEAM_ID" ]; then
            echo "Provisioning profile team id does not match APPLE_TEAM_ID" >&2
            exit 1
          fi
          if [ "$profile_app_identifier" != "$APPLE_TEAM_ID.com.siragpt.app" ]; then
            echo "Provisioning profile application identifier does not match com.siragpt.app" >&2
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

          {
            echo "profile_name=$profile_name"
            echo "profile_uuid=$profile_uuid"
            echo "keychain_path=$keychain_path"
          } >> "$GITHUB_OUTPUT"

      - name: Build signed iOS IPA
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.ios_signing.outputs.profile_name }}
        run: |
          set -eu
          npm run mobile:sync -- ios

          export_options="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$export_options" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.siragpt.app</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          archive_path="$RUNNER_TEMP/SiraGPT.xcarchive"
          export_path="$PWD/output/native-release/ios"
          mkdir -p "$export_path"

          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$archive_path" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath "$archive_path" \
            -exportOptionsPlist "$export_options" \
            -exportPath "$export_path"

          archive_app="$archive_path/Products/Applications/App.app"
          codesign --verify --deep --strict --verbose=2 "$archive_app"

          ipa_path="$(find "$export_path" -type f -name '*.ipa' -print -quit)"
          test -n "$ipa_path"
          verify_path="$RUNNER_TEMP/ios-ipa-verification"
          rm -rf "$verify_path"
          mkdir -p "$verify_path"
          ditto -x -k "$ipa_path" "$verify_path"
          exported_app="$(find "$verify_path/Payload" -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$exported_app"
          codesign --verify --deep --strict --verbose=2 "$exported_app"
          exported_bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$exported_app/Info.plist")"
          test "$exported_bundle_id" = "com.siragpt.app"

      - name: Upload iOS IPA to App Store Connect
        if: ${{ inputs.upload_ios_app_store_connect }}
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -eu
          decode_base64() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          ipa_path="$(find output/native-release/ios -type f -name '*.ipa' -print -quit)"
          if [ -z "$ipa_path" ]; then
            echo "No signed iOS IPA found to upload" >&2
            exit 1
          fi

          key_dir="$HOME/.appstoreconnect/private_keys"
          key_path="$key_dir/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          cleanup() {
            rm -f "$key_path"
          }
          trap cleanup EXIT

          mkdir -p "$key_dir"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | decode_base64 > "$key_path"
          chmod 600 "$key_path"

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$ipa_path" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload iOS signed artifact
        uses: actions/upload-artifact@v6
        with:
          name: siragpt-native-ios
          path: output/native-release/ios/*.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Remove iOS signing assets
        if: ${{ always() }}
        shell: bash
        env:
          KEYCHAIN_PATH: ${{ steps.ios_signing.outputs.keychain_path }}
          PROFILE_UUID: ${{ steps.ios_signing.outputs.profile_uuid }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          if [ -n "$PROFILE_UUID" ]; then
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          fi
          rm -f \
            "$RUNNER_TEMP/ios-signing.p12" \
            "$RUNNER_TEMP/profile.mobileprovision" \
            "$RUNNER_TEMP/profile.plist"
          if [ -n "$APP_STORE_CONNECT_API_KEY_ID" ]; then
            rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          fi

  macos:
    name: macOS signed DMG + ZIP
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos' }}
    needs: preflight
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate macOS signing secrets
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          npm run native:version:check
          npm run native:readiness -- --require=macos

      - name: Build signed and notarized macOS artifacts
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: npm run desktop:dist:mac

      - name: Verify macOS signature and notarization
        shell: bash
        run: |
          set -eu
          mounted_path=""
          cleanup() {
            if [ -n "$mounted_path" ]; then
              hdiutil detach "$mounted_path" >/dev/null 2>&1 || true
              rm -rf "$mounted_path"
            fi
          }
          trap cleanup EXIT

          shopt -s nullglob
          dmg_files=(output/desktop/*.dmg)
          if [ "${#dmg_files[@]}" -eq 0 ]; then
            echo "No macOS DMG artifacts were produced" >&2
            exit 1
          fi
          for dmg_path in "${dmg_files[@]}"; do
            hdiutil verify "$dmg_path"
            xcrun stapler validate "$dmg_path"
            mounted_path="$(mktemp -d "$RUNNER_TEMP/siragpt-dmg.XXXXXX")"
            hdiutil attach -nobrowse -readonly -mountpoint "$mounted_path" "$dmg_path" >/dev/null
            app_path="$(find "$mounted_path" -maxdepth 2 -type d -name '*.app' -print -quit)"
            test -n "$app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"
            spctl --assess --type execute --verbose=4 "$app_path"
            hdiutil detach "$mounted_path" >/dev/null
            rm -rf "$mounted_path"
            mounted_path=""
          done

      - name: Stage macOS artifacts
        shell: bash
        run: |
          set -eu
          mkdir -p output/native-release/macos
          cp output/desktop/*.dmg output/native-release/macos/
          cp output/desktop/*-mac.zip output/native-release/macos/
          cp output/desktop/*.blockmap output/native-release/macos/

      - name: Upload macOS signed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: siragpt-native-macos
          path: output/native-release/macos/*
          retention-days: 30
          if-no-files-found: error

  windows:
    name: Windows signed installer
    if: ${{ inputs.platform == 'all' || inputs.platform == 'windows' }}
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate Windows signing secrets
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          npm run native:version:check
          npm run native:readiness -- --require=windows

      - name: Build signed Windows artifacts
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run desktop:dist:win

      - name: Verify Windows Authenticode signatures
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "output/desktop" -File -Filter "*.exe"
          if ($files.Count -eq 0) {
            throw "No Windows executables were produced"
          }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne "Valid") {
              throw "Invalid Authenticode signature for $($file.Name): $($signature.Status)"
            }
          }

      - name: Stage Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force output/native-release/windows | Out-Null
          Copy-Item output/desktop/*.exe output/native-release/windows/
          Copy-Item output/desktop/*.blockmap output/native-release/windows/ -ErrorAction SilentlyContinue

      - name: Upload Windows signed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: siragpt-native-windows
          path: output/native-release/windows/*
          retention-days: 30
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    if: ${{ always() && inputs.create_github_release && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    needs:
      - preflight
      - android
      - ios
      - macos
      - windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download native artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: siragpt-native-*
          path: output/native-release
          merge-multiple: true

      - name: Normalize release artifact names
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' artifact; do
            file_name="$(basename "$artifact")"
            normalized_name="${file_name// /.}"
            normalized_path="$(dirname "$artifact")/$normalized_name"
            if [ -e "$normalized_path" ]; then
              echo "Release artifact name collision: $normalized_name" >&2
              exit 1
            fi
            mv "$artifact" "$normalized_path"
          done < <(find output/native-release -type f -name '* *' -print0)

      - name: Validate release tag provenance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" 2>/dev/null)"; then
            tag_type="$(jq -r '.object.type' <<<"$ref_json")"
            tag_target="$(jq -r '.object.sha' <<<"$ref_json")"
            while [ "$tag_type" = "tag" ]; do
              tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_target}")"
              tag_type="$(jq -r '.object.type' <<<"$tag_json")"
              tag_target="$(jq -r '.object.sha' <<<"$tag_json")"
            done
            if [ "$tag_target" != "$GITHUB_SHA" ]; then
              echo "Release tag $RELEASE_TAG points to $tag_target instead of build SHA $GITHUB_SHA" >&2
              exit 1
            fi
          fi

      - name: Generate release manifest
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -eu
          node scripts/generate-native-release-manifest.js \
            --dir=output/native-release \
            --out=output/native-release/native-release-manifest.json \
            --markdown-out=output/native-release/native-release-manifest.md \
            --checksums-out=output/native-release/SHA256SUMS.txt \
            --release-tag="$RELEASE_TAG" \
            --git-sha="$GITHUB_SHA"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -eu
          mapfile -d '' files < <(find output/native-release -type f -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No native artifacts found for release" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
            gh release edit "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "SiraGPT native $RELEASE_TAG" \
              --notes-file output/native-release/native-release-manifest.md
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --target "$GITHUB_SHA" \
              --title "SiraGPT native $RELEASE_TAG" \
              --notes-file output/native-release/native-release-manifest.md
          fi
