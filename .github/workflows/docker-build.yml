name: Docker build images

on:
  push:
    branches: [main, production-main]
    paths:
      - Dockerfile
      - .dockerignore
      - backend/Dockerfile
      - package.json
      - package-lock.json
      - backend/package.json
      - backend/package-lock.json
      - next.config.mjs
      - docker-compose*.yml
      - .github/workflows/docker-build.yml
  workflow_dispatch:

env:
  NODE_VERSION: '24'

jobs:
  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image (no push)
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          tags: siragpt-api:ci
          load: true
          # Speed up: skip healthcheck validation during CI (no DB/Redis).
          build-args: BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          tags: siragpt-frontend:ci
          load: true
